<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proofr — Private AI Proofreader &amp; Rewriter</title>
  <meta name="description" content="Free, private AI that proofreads, rewrites in any tone, and translates. Runs on your device. No account, no API key.">
  <style>
    :root {
      --ink: #26251f; --muted: #57554e; --faint: #8a887f;
      --line: #e4e2db; --paper: #faf9f7; --canvas: #f3f2ee; --accent: #2a2926;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
      background: var(--paper); color: var(--ink);
      line-height: 1.65; -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrap { max-width: 560px; padding: 48px 24px; text-align: center; }
    .logo {
      width: 56px; height: 56px; border-radius: 15px; background: var(--ink);
      color: var(--paper); display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .logo svg { width: 32px; height: 32px; }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 16px; margin-bottom: 28px; }
    .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block; text-decoration: none; font-weight: 600; font-size: 14px;
      padding: 11px 20px; border-radius: 10px; border: 1px solid var(--line);
      color: var(--ink); background: var(--canvas);
    }
    a.btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4.5" y1="7.5" x2="13.5" y2="7.5"/><line x1="4.5" y1="11.5" x2="10.5" y2="11.5"/><line x1="4.5" y1="15.5" x2="8.5" y2="15.5"/><path d="M18.4 8 20 9.6l-5.3 5.3-2.1.5.5-2.1L18.4 8z"/></svg></span>
    <h1>Proofr</h1>
    <p>Free, private AI that proofreads, rewrites in any tone, and translates. Runs on your device. No account, no API key.</p>
    <div class="links">
      <a class="btn primary" href="privacy.html">Privacy Policy</a>
      <a class="btn" href="https://github.com/civarry/proofr" target="_blank" rel="noopener">Source on GitHub</a>
    </div>
  </div>
</body>
</html>
